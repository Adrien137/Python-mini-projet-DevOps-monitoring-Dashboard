name: CI/CD DevOps Monitor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  RESOURCE_GROUP: devops-monitor-rg
  CONTAINERAPPS_ENVIRONMENT: devops-monitor-env
  API_APP_NAME: devops-monitor-api
  DASHBOARD_APP_NAME: devops-monitor-dashboard

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: flake8 api/ dashboard/ tests/

      - name: Tests with coverage
        run: pytest tests/ -v --cov=api --cov-fail-under=75

  build:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push API image
        run: |
          docker build -f api/Dockerfile -t ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:${{ github.sha }}

      - name: Build and push dashboard image
        run: |
          docker build -f dashboard/Dockerfile -t ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:${{ github.sha }}

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:${{ github.sha }} \
            --set-env-vars API_KEY=${{ secrets.API_KEY }}

      - name: Read API URL
        id: api_url
        run: |
          API_FQDN=$(az containerapp show \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "api_base_url=https://$API_FQDN" >> "$GITHUB_OUTPUT"

      - name: Deploy dashboard to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.DASHBOARD_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:${{ github.sha }} \
            --set-env-vars API_KEY=${{ secrets.API_KEY }} API_BASE_URL=${{ steps.api_url.outputs.api_base_url }}
