services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: devops-monitor-api
    ports:
      - "8000:8000"
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: devops-monitor-dashboard
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      # Le dashboard atteint l'API via le nom de service Docker, jamais
      # via localhost : les deux conteneurs sont sur le même réseau compose.
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
